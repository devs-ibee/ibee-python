name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Import smoke test
        run: |
          python - <<'EOF'
          from ibee import Ibee, AsyncIbee
          from ibee.environment import IbeeEnvironment

          client = Ibee(token="ibee_test_dummy")
          for ns in ("cloud_vms", "gpu_vms", "object_storage", "secret_store"):
              assert hasattr(client, ns), f"missing namespace: {ns}"
          assert IbeeEnvironment.DEFAULT.value == "https://api.ibee.ai/v1"
          print("smoke test passed")
          EOF

      - name: Build distributions
        run: |
          pip install build
          python -m build
